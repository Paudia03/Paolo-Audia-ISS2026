plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation files('libs/protoactor26-1.0.jar')
    implementation files('libs/unibo.basicomm23-1.0.jar')
    implementation 'io.javalin:javalin:6.1.3'
    implementation 'org.slf4j:slf4j-simple:2.0.9'
    implementation 'com.googlecode.json-simple:json-simple:1.1.1'
    implementation 'it.unibo.alice.tuprolog:tuprolog:3.3.0'
}

application {
    mainClass = 'main.java.protoactor.MainSistemaSAsProtoactor'
}

jar {
    manifest {
        attributes 'Main-Class': 'main.java.protoactor.MainSistemaSAsProtoactor'
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}